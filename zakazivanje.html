<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <title>Zakazivanje - Brazor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- TOAST PORUKA -->
<div id="toast" class="toast-box"></div>

<header class="bg-dark text-white text-center py-4">
  <h1>Zakazivanje termina</h1>
  <p>Radno vreme: 08:00 – 18:00 (nedelja neradna)</p>
</header>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
  <div class="container">

    <a class="navbar-brand" href="index.html">Brazor</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Naslovna</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="onama.html">O nama</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="kontakt.html">Kontakt</a>
        </li>


        <li class="nav-item">
          <a class="nav-link" href="https://www.instagram.com/berbernicabrazor/" target="_blank">Instagram</a>
        </li>

      </ul>
    </div>

  </div>
</nav>

<!-- FORMA -->
<div class="container my-4">
  <div class="card p-4 shadow">

    <h3 class="mb-3">Zakaži termin</h3>

    <form id="rezervacijaForma">

      <label>Ime i prezime:</label>
      <input type="text" id="ime" class="form-control mb-2" required>

      <label>Datum:</label>
      <input type="date" id="datum" class="form-control mb-2" required>

      <label>Vreme:</label>
      <input type="time" id="vreme" class="form-control mb-2" required>

      <button type="submit" class="btn btn-primary mt-2 w-100">
        Zakaži termin
      </button>

    </form>

  </div>
</div>

<!-- JS -->
<script src="index.js"></script>

</body>
</html>
